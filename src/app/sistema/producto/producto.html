<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-secondary fw-bold"><i class="bi bi-box-seam me-2 text-danger"></i> Inventario de Productos</h2>
        <button class="btn btn-danger d-flex align-items-center" (click)="abrirModal()">
            <i class="bi bi-plus-circle me-2"></i> Agregar Producto
        </button>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body p-3">
            <div class="row g-3 align-items-center">
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control border-start-0" placeholder="Buscar por código o nombre..." [(ngModel)]="filtroBusqueda">
                    </div>
                </div>
                <div class="col-12 col-md-6 col-lg-3">
                    <select class="form-select" [(ngModel)]="categoriaSeleccionada">
                        <option *ngFor="let cat of categorias" [value]="cat">{{ cat }}</option>
                    </select>
                </div>
                <div class="col-12 col-lg-5 text-end">
                    <div class="btn-group shadow-sm">
                        <button class="btn btn-outline-dark"><i class="bi bi-file-earmark-excel me-1"></i> Excel</button>
                        <button class="btn btn-outline-dark"><i class="bi bi-file-earmark-pdf me-1"></i> PDF</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th class="ps-4">Código</th>
                        <th>Producto / Marca</th>
                        <th>Categoría</th>
                        <th class="text-center">Stock</th>
                        <th class="text-center">Precio Venta</th>
                        <th class="text-center">Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let prod of productos">
                        <td class="ps-4 fw-bold text-danger">{{ prod.codigo }}</td>
                        <td>
                            <div class="fw-bold">{{ prod.nombre }}</div>
                            <div class="small text-muted">{{ prod.marca }}</div>
                        </td>
                        <td><span class="badge bg-light text-dark border">{{ prod.categoria }}</span></td>
                        <td>
                            <div class="fw-bold" [class.text-danger]="prod.stock <= prod.stock_minimo">
                                {{ prod.stock }} unidades
                            </div>
                            <div class="progress mt-1" style="height: 4px; width: 100px;">
                                <div class="progress-bar" [class.bg-danger]="prod.stock <= prod.stock_minimo" 
                                     [class.bg-success]="prod.stock > prod.stock_minimo"
                                     [style.width.%]="(prod.stock / 50) * 100"></div>
                            </div>
                        </td>
                        <td class="fw-bold text-dark">S/ {{ prod.precio_venta | number:'1.2-2' }}</td>
                        <td>
                            <span class="badge" [class.bg-success]="prod.estado === 'Activo'" [class.bg-secondary]="prod.estado !== 'Activo'">
                                {{ prod.estado }}
                            </span>
                        </td>
                        <td class="text-center">
                            <div class="btn-group">
                                <button class="btn btn-sm btn-outline-dark" (click)="abrirModalEdit(prod)"><i class="bi bi-pencil"></i></button>
                                <button class="btn btn-sm btn-outline-danger" (click)="eliminarProducto(prod.codigo)"><i class="bi bi-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal para Agregar Producto -->
<div class="modal fade" [class.show]="mostrarModal" [style.display]="mostrarModal ? 'block' : 'none'" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-danger text-white border-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-box-seam-fill me-2"></i> Nuevo Producto</h5>
                <button type="button" class="btn-close btn-close-white" (click)="cerrarModal()"></button>
            </div>
            <div class="modal-body p-4">
                <form #productoForm="ngForm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Código de Producto</label>
                            <input type="text" class="form-control" [(ngModel)]="nuevoProducto.codigo" name="codigo" required placeholder="Ej: ACE-001">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Nombre</label>
                            <input type="text" class="form-control" [(ngModel)]="nuevoProducto.nombre" name="nombre" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Marca</label>
                            <input type="text" class="form-control" [(ngModel)]="nuevoProducto.marca" name="marca">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Categoría</label>
                            <select class="form-select" [(ngModel)]="nuevoProducto.id_categoria" name="categoria">
                                <option *ngFor="let cat of categorias.slice(1); let i = index" [value]="i+1">{{ cat }}</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Cantidad Inicial</label>
                            <input type="number" class="form-control" [(ngModel)]="nuevoProducto.cantidad" name="cantidad">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Precio Compra</label>
                            <input type="number" class="form-control" [(ngModel)]="nuevoProducto.precio_compra" name="p_compra">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Precio Venta</label>
                            <input type="number" class="form-control" [(ngModel)]="nuevoProducto.precio_venta" name="p_venta">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-outline-secondary px-4" (click)="cerrarModal()">Cancelar</button>
                <button type="button" class="btn btn-danger px-4" (click)="guardarProducto()">Registrar Producto</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal para Editar Producto -->
<div class="modal fade" [class.show]="mostrarModalEdit" [style.display]="mostrarModalEdit ? 'block' : 'none'" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-dark text-white border-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-pencil-square me-2 text-danger"></i> Editar Producto</h5>
                <button type="button" class="btn-close btn-close-white" (click)="cerrarModalEdit()"></button>
            </div>
            <div class="modal-body p-4">
                <form #productoEditForm="ngForm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Código</label>
                            <input type="text" class="form-control bg-light" [(ngModel)]="productoEditando.codigo" name="codigo_edit" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Nombre</label>
                            <input type="text" class="form-control" [(ngModel)]="productoEditando.nombre" name="nombre_edit">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Stock Actual</label>
                            <input type="number" class="form-control" [(ngModel)]="productoEditando.stock" name="stock_edit">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Precio Venta</label>
                            <input type="number" class="form-control" [(ngModel)]="productoEditando.precio_venta" name="p_venta_edit">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-outline-secondary px-4" (click)="cerrarModalEdit()">Cancelar</button>
                <button type="button" class="btn btn-danger px-4" (click)="actualizarProducto()">Actualizar Producto</button>
            </div>
        </div>
    </div>
</div>

<div *ngIf="mostrarModal || mostrarModalEdit" class="modal-backdrop fade show"></div>
