<!-- Modal para Editar Cliente -->
<div class="modal fade" [class.show]="mostrarModalEdit" [style.display]="mostrarModalEdit ? 'block' : 'none'" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-dark text-white border-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-pencil-square me-2 text-danger"></i> Editar Cliente</h5>
                <button type="button" class="btn-close btn-close-white" (click)="cerrarModalEdit()"></button>
            </div>
            <div class="modal-body p-4">
                <form #clienteForm="ngForm">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-bold">DNI / RUC</label>
                            <input type="text" class="form-control bg-light" [(ngModel)]="clienteEditando.dni" name="dni" readonly>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">Nombres</label>
                            <input type="text" class="form-control" [(ngModel)]="clienteEditando.nombre" name="nombre" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Apellido Paterno</label>
                            <input type="text" class="form-control" [(ngModel)]="clienteEditando.apellido_paterno" name="apellido_paterno" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Apellido Materno</label>
                            <input type="text" class="form-control" [(ngModel)]="clienteEditando.apellido_materno" name="apellido_materno" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Celular</label>
                            <input type="text" class="form-control" [(ngModel)]="clienteEditando.celular" name="celular">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Correo</label>
                            <input type="email" class="form-control" [(ngModel)]="clienteEditando.correo" name="correo">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-outline-secondary px-4" (click)="cerrarModalEdit()">Cancelar</button>
                <button type="button" class="btn btn-danger px-4" (click)="guardarCambios()">Guardar Cambios</button>
            </div>
        </div>
    </div>
</div>
<div *ngIf="mostrarModalEdit" class="modal-backdrop fade show"></div>
