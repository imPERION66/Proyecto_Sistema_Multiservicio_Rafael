<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-secondary fw-bold"><i class="bi bi-people me-2 text-danger"></i> Gestión de Clientes</h2>
        <button type="button" class="btn btn-danger d-flex align-items-center">
            <i class="bi bi-plus-circle me-2"></i> Agregar Cliente
        </button>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body p-3">
            <div class="row g-3 align-items-center">
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" class="form-control border-start-0" placeholder="Buscar por DNI o nombre...">
                    </div>
                </div>
                <div class="col-12 col-lg-8 text-end">
                    <div class="btn-group shadow-sm">
                        <button class="btn btn-outline-dark btn-sm"><i class="bi bi-file-earmark-excel me-1"></i> Excel</button>
                        <button class="btn btn-outline-dark btn-sm"><i class="bi bi-file-earmark-pdf me-1"></i> PDF</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th class="ps-4">DNI / RUC</th>
                        <th>Nombres y Apellidos</th>
                        <th>Vehículo Registrado</th>
                        <th>Contacto</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let cliente of clientes">
                        <td class="ps-4 fw-bold">{{ cliente.dni }}</td>
                        <td>
                            <div class="fw-bold">{{ cliente.nombre }} {{ cliente.apellido_paterno }} {{ cliente.apellido_materno }}</div>
                        </td>
                        <td>Registro Base de Datos</td>
                        <td class="text-nowrap">
                            <div class="small"><i class="bi bi-phone me-1"></i>{{ cliente.celular }}</div>
                            <div class="small text-muted"><i class="bi bi-envelope me-1"></i>{{ cliente.correo }}</div>
                        </td>
                        <td class="text-center text-nowrap">
                            <div class="btn-group">
                                <button class="btn btn-sm btn-outline-dark" (click)="abrirModalEdit(cliente)">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger" (click)="eliminarCliente(cliente.dni)">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal para Editar Cliente -->
<div class="modal fade" [class.show]="mostrarModalEdit" [style.display]="mostrarModalEdit ? 'block' : 'none'" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-dark text-white border-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-pencil-square me-2 text-danger"></i> Editar Cliente</h5>
                <button type="button" class="btn-close btn-close-white" (click)="cerrarModalEdit()"></button>
            </div>
            <div class="modal-body p-4">
                <form #clienteForm="ngForm">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-bold small">DNI / RUC</label>
                            <input type="text" class="form-control form-control-sm bg-light" [(ngModel)]="clienteEditando.dni" name="dni" readonly>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold small">Nombres</label>
                            <input type="text" class="form-control form-control-sm" [(ngModel)]="clienteEditando.nombre" name="nombre" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small">Apellido Paterno</label>
                            <input type="text" class="form-control form-control-sm" [(ngModel)]="clienteEditando.apellido_paterno" name="apellido_paterno" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small">Apellido Materno</label>
                            <input type="text" class="form-control form-control-sm" [(ngModel)]="clienteEditando.apellido_materno" name="apellido_materno" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small">Celular</label>
                            <input type="text" class="form-control form-control-sm" [(ngModel)]="clienteEditando.celular" name="celular">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small">Correo</label>
                            <input type="email" class="form-control form-control-sm" [(ngModel)]="clienteEditando.correo" name="correo">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-outline-secondary px-4" (click)="cerrarModalEdit()">Cancelar</button>
                <button type="button" class="btn btn-danger px-4" (click)="guardarCambios()">Guardar Cambios</button>
            </div>
        </div>
    </div>
</div>
<div *ngIf="mostrarModalEdit" class="modal-backdrop fade show"></div>
