<div class="modal-header bg-dark text-white border-0 py-3 py-md-4">
    <h5 class="modal-title fw-bold">
        <i class="bi bi-pencil-square me-2 text-danger"></i> Editar Trabajador
    </h5>
    <button type="button" class="btn-close btn-close-white" (click)="cerrarModal()"></button>
</div>

<div class="modal-body p-4 p-md-5">
    <form #trabajadorEditForm="ngForm">
        <div class="row g-3 g-md-4">
            <div class="col-md-6">
                <label class="form-label fw-bold small mb-2">Nombres</label>
                <input type="text" class="form-control form-control-sm"
                    [(ngModel)]="trabajadorEditando.nombre" name="nombre_edit" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold small mb-2">DNI / RUC</label>
                <input type="text" class="form-control form-control-sm bg-light"
                    [(ngModel)]="trabajadorEditando.numeroDocumento"
                    name="dni_edit" readonly>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold small mb-2">Apellido Paterno</label>
                <input type="text" class="form-control form-control-sm"
                    [(ngModel)]="trabajadorEditando.apellido_paterno"
                    name="ap_edit" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold small mb-2">Apellido Materno</label>
                <input type="text" class="form-control form-control-sm"
                    [(ngModel)]="trabajadorEditando.apellido_materno"
                    name="am_edit" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold small mb-2">Celular</label>
                <input type="text" class="form-control form-control-sm"
                    [(ngModel)]="trabajadorEditando.celular" name="cel_edit">
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold small mb-2">Cargo</label>
                <select class="form-select form-select-sm"
                    [(ngModel)]="trabajadorEditando.cargo"
                    name="cargo_edit"
                    (change)="onCargoChange()">
                    <option *ngFor="let cargo of cargos" [value]="cargo.nombre">
                        {{ cargo.nombre }}
                    </option>
                </select>
            </div>
            <div class="col-12">
                <label class="form-label fw-bold small mb-2">Estado</label>
                <select class="form-select form-select-sm"
                    [(ngModel)]="trabajadorEditando.estado" name="estado_edit">
                    <option value="Activo">Activo</option>
                    <option value="Inactivo">Inactivo</option>
                </select>
            </div>

            <div class="col-12 mt-4" *ngIf="cargoRequiereCredenciales()">
                <div class="p-4 p-md-5 bg-light rounded">
                    <h6 class="fw-bold text-danger mb-3">Credenciales de acceso</h6>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small mb-2">Usuario</label>
                            <input class="form-control form-control-sm"
                                [(ngModel)]="trabajadorEditando.usuario" name="usuario_edit">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small mb-2">Contraseña</label>
                            <input type="password" class="form-control form-control-sm"
                                [(ngModel)]="trabajadorEditando.contrasena" name="contrasena_edit">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<div class="modal-footer border-0 p-4 p-md-5">
    <button type="button" class="btn btn-outline-secondary px-4" (click)="cerrarModal()">Cancelar</button>
    <button type="button" class="btn btn-danger px-4" (click)="actualizarTrabajador()">Actualizar Datos</button>
</div>
