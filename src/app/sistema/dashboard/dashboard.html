<div class="container-fluid p-4 bg-light">
    <!-- Header -->
    <div class="mb-4">
        <h2 class="fw-bold text-dark"><i class="bi bi-speedometer2 me-2 text-danger"></i> Panel de Control</h2>
        <p class="text-muted">Resumen operativo de Multiservicios Rafael</p>
    </div>

    <!-- Stats Cards -->
    <div class="row g-4 mb-4">
        <div *ngFor="let stat of stats" class="col-12 col-sm-6 col-xl-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center">
                    <div class="flex-shrink-0 bg-light rounded-circle p-3 me-3">
                        <i class="bi {{stat.icon}} fs-3 {{stat.color}}"></i>
                    </div>
                    <div>
                        <h6 class="text-muted mb-0 small">{{stat.title}}</h6>
                        <h4 class="fw-bold mb-0">{{stat.value}}</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Charts Row 1 -->
    <div class="row g-4 mb-4">
        <!-- Ventas Mensuales -->
        <div class="col-12 col-xl-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 fw-bold">Rendimiento de Ventas (Soles)</h5>
                </div>
                <div class="card-body">
                    <c-chart type="bar" [data]="ventasChartData" [options]="chartOptions"></c-chart>
                </div>
            </div>
        </div>

        <!-- Estado del Stock -->
        <div class="col-12 col-xl-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 fw-bold">Estado del Inventario</h5>
                </div>
                <div class="card-body">
                    <c-chart type="doughnut" [data]="stockChartData" [options]="chartOptionsPie"></c-chart>
                </div>
            </div>
        </div>
    </div>

    <!-- Charts Row 2 -->
    <div class="row g-4">
        <!-- Servicios por Estado -->
        <div class="col-12 col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 fw-bold">Estado de Ordenes de Servicio</h5>
                </div>
                <div class="card-body">
                    <c-chart type="pie" [data]="serviciosChartData" [options]="chartOptionsPie"></c-chart>
                </div>
            </div>
        </div>
</div>
</div>
